# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ignis_oaz}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ignis}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ignis123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema initialization
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# Server
server.port=${SERVER_PORT:8080}

# Security - JWT Configuration
jwt.secret=${JWT_SECRET:IgnisOazSecretKeyForJwtTokenGeneration2024MustBeAtLeast32Bytes}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Rate Limiting
auth.rate-limit.max-attempts=5
auth.rate-limit.window-minutes=15
