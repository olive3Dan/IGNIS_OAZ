# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/ignis_oaz
spring.datasource.username=ignis
spring.datasource.password=ignis123
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema initialization
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Server
server.port=8080

# Security - JWT Configuration
jwt.secret=IgnisOazSecretKeyForJwtTokenGeneration2024MustBeAtLeast32Bytes
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Rate Limiting
auth.rate-limit.max-attempts=5
auth.rate-limit.window-minutes=15
