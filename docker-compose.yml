version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ignis-db
    environment:
      POSTGRES_DB: ignis_oaz
      POSTGRES_USER: ignis
      POSTGRES_PASSWORD: ignis123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
